 <div #modelado id="divModelado"  >
    <div id="tools">
      <app-actions-model id="actionsModel"></app-actions-model>
    </div>
</div>

<!-- Botones flotantes 2D (fuera del contenedor con overflow:hidden) -->
<ng-container *ngFor="let button of activeButtons">
  <div
    class="floatingButton"
    [style.left.px]="button.screenX"
    [style.top.px]="button.screenY"
    *ngIf="button.visible"
  >
    <button (click)="onFloatingButtonClick(button)">+</button>
  </div>
</ng-container>
