<div id="actionButons">
  <button class="main-button" (click)="toggleMenu()"><img src="/assets/options-Icon.svg" alt="Opciones"></button>
  <ul class="dropdown-menu" [class.open]="isMenuOpen">
    <li id="AddBrick" class="has-submenu">
      <button class="dropdown-button" [class.active]="isAddBrickActive" (click)="toggleBlockSubMenu()"><img src="/assets/brick-Icon.svg" alt="ladrillo"></button>
      <ul class="decoration-submenu" [class.open]="isBlockSubMenuOpen">
        <li><button class="decoration-button" [style.background]="currentBlockSize === 'full' ? 'rgba(255,255,255,0.2)' : 'transparent'" (click)="onAddBrick('full')">Completo</button></li>
        <li><button class="decoration-button" [style.background]="currentBlockSize === 'half' ? 'rgba(255,255,255,0.2)' : 'transparent'" (click)="onAddBrick('half')">Medio</button></li>
      </ul>
    </li>
    <img src="/assets/next-Icon.svg" alt="next">
    <img src="/assets/next-Icon.svg" alt="next">
    <li id="Wall"><button class="dropdown-button" [class.active]="isWallActive" (click)="buildWall()"><img src="/assets/wall-Icon.svg" alt="muro"></button></li>
    <img src="/assets/next-Icon.svg" alt="next">
    <img src="/assets/next-Icon.svg" alt="next">
    <li id="decoration" class="has-submenu">
      <button class="dropdown-button" [class.active]="isDecorationsActive" (click)="toggleDecorationSubMenu()"><img src="/assets/door-Icon.svg" alt="puerta"></button>
      <ul class="decoration-submenu" [class.open]="isDecorationSubMenuOpen">
        <li><button class="decoration-button" (click)="onAddDecoration('door')">Puerta</button></li>
        <li><button class="decoration-button" (click)="onAddDecoration('window')">Ventana</button></li>
      </ul>
    </li>
    <img src="/assets/next-Icon.svg" alt="next">
    <img src="/assets/next-Icon.svg" alt="next">
    <li><button class="dropdown-button"><img src="/assets/floor-Icon.svg" alt="piso"></button></li>
    <img src="/assets/next-Icon.svg" alt="next">
    <img src="/assets/next-Icon.svg" alt="next">
    <li><button class="dropdown-button"><img src="/assets/house-Icon.svg" alt="casa"></button></li>
  </ul>

  <div id="opacityControl">
    <label>Opacidad</label>
    <input
      type="range"
      min="0.2"
      max="1.0"
      step="0.1"
      [value]="opacity"
      (input)="onOpacityChange($event)"
    />
  </div>

  <div id="lineGuides">
    <button
      (click)="toggleGuias()"
      class="px-4 py-2 rounded text-white text-sm font-medium transition-colors"
      [class.bg-blue-600]="guiasActivas"
      [class.bg-zinc-800]="!guiasActivas"
    >
      {{ guiasActivas ? 'Guías ON' : 'Guías OFF' }}
    </button>

    <div id="metricas">
      <p># de bloques construidos {{getNumBlocks()}}</p>
      <p># de columnas construidas {{getColumnCount()}}</p>
      <p># de bloques consecutivos {{getSecuenceBlocks()}}</p>
    </div>
  </div>

</div>

<div id="tutorials">
    <div id="messageBox" [class.show]="isAddBrickActive || isDecorationsActive">
        {{ getMessage() }}
    </div>
</div>

<div id="camare">
    <button id="InfoControls" class="dropdown-button" (click)="toggleCamera()"><img src="/assets/camera-Icon.svg" alt="Camera"></button>
</div>
