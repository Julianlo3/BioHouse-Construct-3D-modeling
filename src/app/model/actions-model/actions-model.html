<div id="actionButons">
  <nav class="center-nav">
    <div class="button-group">
      <div class="has-submenu">
        <button class="action-button main-dark" [class.active]="isAddBrickActive" (click)="toggleBlockSubMenu()">
          <img src="/assets/brick-Icon.svg" alt="ladrillo">
        </button>
        <ul class="decoration-submenu" [class.open]="isBlockSubMenuOpen">
          <li><button class="decoration-button" (click)="onAddBrick('full')">Completo</button></li>
          <li><button class="decoration-button" (click)="onAddBrick('half')">Medio</button></li>
        </ul>
      </div>

      <img class="separator" src="/assets/next-Icon.svg" alt="next">

      <button class="action-button main-dark" [class.active]="isWallActive" (click)="buildWall()">
        <img src="/assets/wall-Icon.svg" alt="muro">
      </button>

      <img class="separator" src="/assets/next-Icon.svg" alt="next">

      <div class="has-submenu">
        <button class="action-button main-dark" [class.active]="isDecorationsActive" (click)="toggleDecorationSubMenu()">
          <img src="/assets/door-Icon.svg" alt="puerta">
        </button>
        <ul class="decoration-submenu" [class.open]="isDecorationSubMenuOpen">
          <li><button class="decoration-button" (click)="onAddDecoration('door')">Puerta</button></li>
          <li><button class="decoration-button" (click)="onAddDecoration('window')">Ventana</button></li>
        </ul>
      </div>

      <img class="separator" src="/assets/next-Icon.svg" alt="next">

      <button class="action-button main-dark" (click)="buildFloor()">
        <img src="/assets/floor-Icon.svg" alt="piso">
      </button>

      <img class="separator" src="/assets/next-Icon.svg" alt="next">

      <button class="action-button main-dark" (click)="saveModel()">
        <img src="/assets/house-Icon.svg" alt="casa">
      </button>
    </div>
  </nav>

  <div class="side-panel">

    <!-- ─── Selector de Pisos ─── -->
    <div id="floorSelector">
      <label class="panel-label">🏢 Pisos</label>

      <div class="floor-tabs">
        <button
          *ngFor="let floor of floors"
          class="floor-tab"
          [class.active]="activeFloorLevel === floor.level"
          (click)="selectFloor(floor.level)"
          [id]="'floor-tab-' + floor.level">
          Piso {{ floor.level }}
        </button>
      </div>

      <button
        id="addFloorBtn"
        class="add-floor-btn"
        [disabled]="!canAddFloor()"
        (click)="addFloor()">
        &#43; Agregar Piso
      </button>
    </div>

    <!-- ─── Opacidad por piso ─── -->
    <div id="opacityControl">
      <label>Opacidad — Piso {{ activeFloorLevel }}</label>
      <input type="range" min="0.1" max="1.0" step="0.05"
             [value]="floorOpacity"
             (input)="onFloorOpacityChange($event)" />
    </div>

    <!-- ─── Guías + métricas ─── -->
    <div id="lineGuides">
      <button (click)="toggleGuias()" class="guias-btn" [class.active]="guiasActivas">
        {{ guiasActivas ? 'Guías ON' : 'Guías OFF' }}
      </button>

      <div id="metricas">
        <p>Piso activo: {{activeFloorLevel}} / {{floors.length}}</p>
        <p>Bloques: {{getNumBlocks()}}</p>
        <p>Columnas: {{getColumnCount()}}</p>
        <p>Área: {{ floorArea | number:'1.0-2' }} m²</p>
      </div>
    </div>
  </div>
</div>

<div id="tutorials">
  <div id="messageBox" [class.show]="isAddBrickActive || isDecorationsActive">
    {{ getMessage() }}
  </div>
</div>

<div id="camare">
  <button id="InfoControls" class="action-button main-dark" (click)="toggleCamera()">
    <img src="/assets/camera-Icon.svg" alt="Camera">
  </button>
</div>
