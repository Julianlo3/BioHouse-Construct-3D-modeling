 <div #modelado id="divModelado"  >
    <app-actions-model></app-actions-model>
    <div id="tools">
      <p class="info" id="numBlock"># de bloques: {{numBlocks}}</p>
      <button class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 transition" type="button" (click)="construirMuros()">Levantar Muros</button>
    </div>
  @if (selectedCube) {
    @for (btn of activeButtons; track $index) {
      @if (btn.visible) {
        <div
          class="floatingButton"
          [style.left.px]="btn.screenX"
          [style.top.px]="btn.screenY"
        >
          <button (click)="crearBloqueDesdeSeleccion(btn.offsetX, btn.offsetZ, btn.rotateY)">+</button>
        </div>
      }
    }
  }
</div>
