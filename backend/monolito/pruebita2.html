<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Viewer Modelos 3D</title>

    <link rel="icon" href="data:,">

    <!-- 🔥 IMPORTMAP (SOLUCION AL ERROR DE THREE) -->
    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            background: #1e1e2f;
            color: #fff;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            z-index: 10;
            min-width: 250px;
        }

        #ui input {
            width: 100%;
            padding: 6px;
            margin-bottom: 8px;
            border-radius: 4px;
            border: none;
        }

        #ui button {
            width: 100%;
            padding: 6px;
            background: #4e54c8;
            border: none;
            color: white;
            cursor: pointer;
        }

        #modelList {
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        .model-item {
            padding: 5px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .model-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>

    <div id="ui">
        <h3>Cargar modelo</h3>
        <input type="number" id="modelId" placeholder="ID modelo">
        <button onclick="cargarModelo()">Cargar</button>

        <hr>

        <h3>Modelos por usuario</h3>
        <input type="number" id="userId" placeholder="ID usuario">
        <button onclick="cargarModelosPorUsuario()">Listar</button>

        <div id="modelList"></div>
    </div>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
        import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";

        // escena
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222233);

        // cámara
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        // renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // controles
        new OrbitControls(camera, renderer.domElement);

        // luz
        const light = new THREE.HemisphereLight(0xffffff, 0x444444);
        scene.add(light);

        // loader
        const loader = new GLTFLoader();

        // animación
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // limpiar escena
        function clearScene() {
            const toRemove = [];
            scene.traverse(obj => {
                if (obj.type !== "HemisphereLight" && obj.type !== "Scene") {
                    toRemove.push(obj);
                }
            });
            toRemove.forEach(o => scene.remove(o));
        }

        // 🔥 cargar modelo por ID
        window.cargarModelo = async function () {
            const id = document.getElementById("modelId").value;
            if (!id) return alert("Ingresa ID");

            try {
                const res = await fetch("http://localhost:8080/api/models/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: Number(id) })
                });

                const data = await res.json();
                console.log(data);

                clearScene();
                scene.add(light);

                const mat = data.materials[0];

                loader.load(mat.assetPath, (gltf) => {
                    const model = gltf.scene;
                    model.position.set(mat.positionX, mat.positionY, mat.positionZ);
                    model.rotation.set(mat.rotationX, mat.rotationY, mat.rotationZ);
                    scene.add(model);
                });

            } catch (e) {
                console.error(e);
                alert("Error backend");
            }
        };

        // 🔥 listar modelos por usuario
        window.cargarModelosPorUsuario = async function () {
            const userId = document.getElementById("userId").value;
            if (!userId) return alert("Ingresa ID usuario");

            try {
                const res = await fetch("http://localhost:8080/api/models/user/list", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ id: Number(userId) })
                });

                const list = await res.json();
                console.log(list);

                const container = document.getElementById("modelList");
                container.innerHTML = "";

                list.forEach(model => {
                    const div = document.createElement("div");
                    div.className = "model-item";
                    div.textContent = `${model.id} - ${model.title || "Sin título"}`;

                    div.onclick = () => {
                        clearScene();
                        scene.add(light);

                        const mat = model.materials[0];

                        loader.load(mat.assetPath, (gltf) => {
                            const obj = gltf.scene;
                            obj.position.set(mat.positionX, mat.positionY, mat.positionZ);
                            obj.rotation.set(mat.rotationX, mat.rotationY, mat.rotationZ);
                            scene.add(obj);
                        });
                    };

                    container.appendChild(div);
                });

            } catch (e) {
                console.error(e);
                alert("Error listando modelos");
            }
        };

        // resize
        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>

</html>
